<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyshop - Tregu Dixhital</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            max-width: 480px;
            width: 90%;
            background: white;
            border-radius: 16px;
            padding: 48px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 32px;
        }

        .balance-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            color: white;
        }

        .balance-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 700;
        }

        .product-card {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .product-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .security {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Përfundoni Pagesën</h1>
    <p class="subtitle">Depozitoni në llogarinë tuaj</p>

    <div id="successMsg" class="success-message">✓ Pagesa u krye me sukses</div>
    <div id="errorMsg" class="error-message"></div>

    <div class="balance-card">
        <div class="balance-label">Balanca juaj</div>
        <div class="balance-amount" id="balanceDisplay">€ 0.00</div>
    </div>

    <div class="product-card" id="productCard" style="display: none;">
        <div class="product-name" id="productName"></div>
        <div class="product-price" id="productPrice"></div>
    </div>

    <div class="input-group">
        <label for="amount">Shuma për pagesë</label>
        <input 
            id="amount" 
            type="number" 
            placeholder="0.00" 
            step="0.01" 
            min="0"
        >
    </div>

    <button class="btn" id="payBtn" onclick="processPayment()">Paguaj</button>

    <div class="security">
        🔒 Pagesa e Sigurt
    </div>
</div>

<script>
    let balance = 1250.50;
    let isLoading = false;

    document.getElementById('balanceDisplay').textContent = '€ ' + balance.toFixed(2);

    function processPayment() {
        const amountInput = document.getElementById('amount');
        const amount = parseFloat(amountInput.value);
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const btn = document.getElementById('payBtn');

        errorMsg.style.display = 'none';
        successMsg.style.display = 'none';

        if (!amount || amount <= 0) {
            errorMsg.textContent = 'Shuma duhet të jetë më e madhe se 0';
            errorMsg.style.display = 'block';
            return;
        }

        if (amount > balance) {
            errorMsg.textContent = 'Shuma tejkalon balancën tuaj';
            errorMsg.style.display = 'block';
            return;
        }

        isLoading = true;
        btn.disabled = true;
        btn.textContent = 'Po procesohej...';

        setTimeout(() => {
            isLoading = false;
            btn.disabled = false;
            btn.textContent = 'Paguaj';
            balance -= amount;
            document.getElementById('balanceDisplay').textContent = '€ ' + balance.toFixed(2);
            amountInput.value = '';
            successMsg.style.display = 'block';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }, 1500);
    }

    document.getElementById('amount').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') processPayment();
    });
</script>

</body>
</html>
